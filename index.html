<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splendor - 璀璨宝石</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>💎 Splendor 璀璨宝石</h1>
            <div class="game-info">
                <span id="current-player">当前玩家：玩家 1</span>
                <button id="new-game-btn" class="btn">新游戏</button>
            </div>
        </header>

        <!-- 游戏板 -->
        <div class="game-board">
            <!-- 宝石池 -->
            <div class="gem-pool section">
                <h2>💎 宝石池</h2>
                <div class="gems-container" id="gem-pool">
                    <div class="gem-slot" data-color="white">
                        <div class="gem gem-white"></div>
                        <span class="gem-count" id="gem-white">4</span>
                    </div>
                    <div class="gem-slot" data-color="blue">
                        <div class="gem gem-blue"></div>
                        <span class="gem-count" id="gem-blue">4</span>
                    </div>
                    <div class="gem-slot" data-color="green">
                        <div class="gem gem-green"></div>
                        <span class="gem-count" id="gem-green">4</span>
                    </div>
                    <div class="gem-slot" data-color="red">
                        <div class="gem gem-red"></div>
                        <span class="gem-count" id="gem-red">4</span>
                    </div>
                    <div class="gem-slot" data-color="black">
                        <div class="gem gem-black"></div>
                        <span class="gem-count" id="gem-black">4</span>
                    </div>
                    <div class="gem-slot" data-color="gold">
                        <div class="gem gem-gold"></div>
                        <span class="gem-count" id="gem-gold">5</span>
                    </div>
                </div>
            </div>

            <!-- 贵族卡 -->
            <div class="nobles-section section">
                <h2>👑 贵族卡</h2>
                <div class="cards-container" id="nobles-container"></div>
            </div>

            <!-- 卡牌层级 -->
            <div class="cards-section section">
                <div class="tier" id="tier3">
                    <h3>Tier 3 (4-5 分)</h3>
                    <div class="cards-container" id="tier3-container"></div>
                </div>
                <div class="tier" id="tier2">
                    <h3>Tier 2 (1-3 分)</h3>
                    <div class="cards-container" id="tier2-container"></div>
                </div>
                <div class="tier" id="tier1">
                    <h3>Tier 1 (0 分)</h3>
                    <div class="cards-container" id="tier1-container"></div>
                </div>
            </div>
        </div>

        <!-- 玩家区域 -->
        <div class="players-area">
            <div class="player-section section" id="player-0">
                <h3>🎮 玩家 1</h3>
                <div class="player-stats">
                    <span class="points">得分：<span id="p0-points">0</span></span>
                </div>
                <div class="player-gems" id="p0-gems"></div>
                <div class="player-cards" id="p0-cards"></div>
            </div>
            <div class="player-section section" id="player-1">
                <h3>🎮 玩家 2</h3>
                <div class="player-stats">
                    <span class="points">得分：<span id="p1-points">0</span></span>
                </div>
                <div class="player-gems" id="p1-gems"></div>
                <div class="player-cards" id="p1-cards"></div>
            </div>
        </div>

        <!-- 行动面板 -->
        <div class="action-panel section">
            <h2>🎯 行动</h2>
            <div class="actions-container">
                <button class="action-btn" id="take-3-different" disabled>拿取 3 个不同宝石</button>
                <button class="action-btn" id="take-2-same" disabled>拿取 2 个相同宝石</button>
                <button class="action-btn" id="reserve-card" disabled>预订卡牌</button>
                <button class="action-btn" id="buy-card" disabled>购买卡牌</button>
            </div>
            <div id="message-area" class="message-area"></div>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2>🎉 游戏结束!</h2>
                <p id="winner-text"></p>
                <button class="btn" onclick="location.reload()">再来一局</button>
            </div>
        </div>
    </div>

    <script src="splendor-core.js"></script>
    <script src="game.js"></script>
</body>
</html>
